<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="tank-agent-os — Run AI coding agents in a tank: audited, bounded, observable.">
  <!-- Hand-authored SVG; theme-adaptive (auto light/dark via prefers-color-scheme). -->
  <style>
    /* Theme tokens — default: dark. Light overrides in @media below. */
    svg{
      --banner-bg:#15181b;
      --bracket:#5db89c;
      --title-accent:#5db89c;
      --title-fg:#e8eaed;
      --subtitle:#8b9398;
      --tagline:#5db89c;
    }
    @media (prefers-color-scheme: light){
      svg{
        --banner-bg:#f6f8fa;
        --bracket:#2e9c7e;
        --title-accent:#1f8a6a;
        --title-fg:#1f2328;
        --subtitle:#57606a;
        --tagline:#2e9c7e;
      }
    }
    .bg{fill:var(--banner-bg)}
    .bracket{stroke:var(--bracket)}
    .t-accent{fill:var(--title-accent)}
    .t-fg{fill:var(--title-fg)}
    .subtitle{fill:var(--subtitle)}
    .tagline{fill:var(--tagline)}
  </style>
  <rect class="bg" width="1200" height="300" rx="16"/>
  <!-- containment corner brackets: the tank that holds the agent -->
  <g class="bracket" stroke-width="5" fill="none" stroke-linecap="square">
    <path d="M140 55 H70 V125"/>
    <path d="M1060 55 H1130 V125"/>
    <path d="M140 245 H70 V175"/>
    <path d="M1060 245 H1130 V175"/>
  </g>
  <text x="600" y="150" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="74" font-weight="700" letter-spacing="1">
    <tspan class="t-accent">tank</tspan><tspan class="t-fg">-agent-os</tspan>
  </text>
  <text x="600" y="192" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="24" class="subtitle">Run AI coding agents in a tank</text>
  <text x="600" y="227" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="18" class="tagline" letter-spacing="3">audited &#183; bounded &#183; observable</text>
</svg>
