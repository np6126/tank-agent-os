<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1110" viewBox="0 0 1240 1110"
     font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <!-- tank-agent-os trust boundaries. Hand-authored SVG; theme-adaptive (auto light/dark). Edit coordinates directly to maintain. -->
  <style>
    /* ===== Theme tokens — default: dark. Light overrides in @media below. ===== */
    svg{
      --bg:#15181b; --vm-fill:#1a1e22; --vm-stroke:#333a42; --tab-fill:#22262b;
      --edge:#5a646c;
      --ink:#c5cdd2; --ink-strong:#e8eaed; --ink-mid:#9aa3a9; --ink-muted:#8b9398;
      --green:#5db89c; --green-fill:#1a2a25; --green-text:#9fd8c6; --green-text2:#7fc4ad;
      --blue:#5b8b9c; --blue-fill:#1a2329; --blue-strong:#d3dde1; --blue-text:#93b8c4; --blue-dim:#7aa3b0;
      --amber:#e0a458; --amber-fill:#2a2316; --amber-strong:#f0c07a; --amber-text:#cf9a52; --amber-dim:#b9863f;
      --red:#cf6b5c; --red-fill:#241a18; --red-tab-fill:#3a2420; --red-tab-stroke:#5a342e; --red-text:#e0958a;
      --shadow:#000000; --shadow-op:.55;
    }
    @media (prefers-color-scheme: light){
      svg{
        --bg:#ffffff; --vm-fill:#f6f8fa; --vm-stroke:#d0d7de; --tab-fill:#eaeef2;
        --edge:#848d96;
        --ink:#1f2328; --ink-strong:#1f2328; --ink-mid:#57606a; --ink-muted:#6e7781;
        --green:#1f8a6a; --green-fill:#eaf5f0; --green-text:#1f7a5e; --green-text2:#2e8b6f;
        --blue:#3d7d91; --blue-fill:#eef3f6; --blue-strong:#1f2328; --blue-text:#356577; --blue-dim:#5a818f;
        --amber:#bf8b3e; --amber-fill:#fbf1dd; --amber-strong:#8a6420; --amber-text:#9a6f28; --amber-dim:#a9803a;
        --red:#c0463a; --red-fill:#fdecea; --red-tab-fill:#fbe0dd; --red-tab-stroke:#e9b3ac; --red-text:#a33327;
        --shadow:#1f2328; --shadow-op:.16;
      }
    }
    .bg{fill:var(--bg)}
    .vm{fill:var(--vm-fill);stroke:var(--vm-stroke)}
    .tab{fill:var(--tab-fill);stroke:var(--vm-stroke)}
    .label-pill{fill:var(--bg);stroke:var(--vm-stroke)}
    .boundary-red{fill:var(--red-fill);stroke:var(--red)}
    .tab-red{fill:var(--red-tab-fill);stroke:var(--red-tab-stroke)}
    .edge{stroke:var(--edge)}
    .arrow{fill:var(--edge)}
    .card-green{fill:var(--green-fill);stroke:var(--green)}
    .card-blue{fill:var(--blue-fill);stroke:var(--blue)}
    .card-amber{fill:var(--amber-fill);stroke:var(--amber)}
    .h-ink{fill:var(--ink)}
    .h-strong{fill:var(--ink-strong)}
    .h-blue{fill:var(--blue-strong)}
    .h-amber{fill:var(--amber-strong)}
    .tx-green{fill:var(--green-text)}
    .tx-green2{fill:var(--green-text2)}
    .tx-blue{fill:var(--blue-text)}
    .tx-blue-dim{fill:var(--blue-dim)}
    .tx-amber{fill:var(--amber-text)}
    .tx-amber-dim{fill:var(--amber-dim)}
    .tx-red{fill:var(--red-text)}
    .tx-mid{fill:var(--ink-mid)}
    .tx-muted{fill:var(--ink-muted)}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" class="arrow"/>
    </marker>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" style="flood-color:var(--shadow);flood-opacity:var(--shadow-op)"/>
    </filter>
  </defs>

  <rect class="bg" width="1240" height="1110"/>

  <!-- ===== Trust boundary: agent VM ===== -->
  <rect class="vm" x="44" y="44" width="1152" height="724" rx="18" stroke-width="1.5"/>
  <rect class="tab" x="62" y="30" width="252" height="30" rx="9" stroke-width="1"/>
  <text class="tx-mid" x="188" y="50" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" font-weight="600">Trust boundary &#183; agent VM</text>

  <!-- ===== Trust boundary: proxy host ===== -->
  <rect class="boundary-red" x="330" y="824" width="580" height="168" rx="18" stroke-width="1.5"/>
  <rect class="tab-red" x="348" y="810" width="266" height="30" rx="9" stroke-width="1"/>
  <text class="tx-red" x="481" y="830" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" font-weight="600">Trust boundary &#183; proxy host</text>

  <!-- ===== edges ===== -->
  <g class="edge" fill="none" stroke-width="2">
    <path d="M620,188 L620,238" stroke-dasharray="6 5" marker-end="url(#arr)"/>
    <path d="M500,326 L224,406" marker-end="url(#arr)"/>
    <path d="M560,326 L488,406" marker-end="url(#arr)"/>
    <path d="M680,326 L752,406" marker-end="url(#arr)"/>
    <path d="M740,326 L1018,406" marker-end="url(#arr)"/>
    <path d="M486,478 L486,502" marker-end="url(#arr)"/>
    <path d="M218,534 L438,640" marker-end="url(#arr)"/>
    <path d="M486,574 L540,640" marker-end="url(#arr)"/>
    <path d="M754,510 L688,640" marker-end="url(#arr)"/>
    <path d="M1022,510 L802,640" marker-end="url(#arr)"/>
    <path d="M400,286 L88,286 Q72,286 72,302 L72,674 Q72,690 88,690 L352,690" marker-end="url(#arr)"/>
    <path d="M620,734 L620,856" marker-end="url(#arr)"/>
    <path d="M620,964 L620,1028" marker-end="url(#arr)"/>
  </g>

  <!-- ===== config (root-owned, read-only) ===== -->
  <rect class="vm" x="310" y="84" width="620" height="104" rx="12" stroke-width="1.5" filter="url(#sh)"/>
  <text class="h-ink" x="620" y="118" text-anchor="middle" font-size="15" font-weight="700">Config &#183; root-owned &#183; read-only</text>
  <text class="tx-muted" x="620" y="143" text-anchor="middle" font-size="12.5">/etc/clawx/CLAUDE.md  &#8594;  ~/CLAUDE.md + ~/AGENTS.md</text>
  <text class="tx-muted" x="620" y="166" text-anchor="middle" font-size="12.5">/etc/clawx/opencode-config.json  &#183;  from agent.env</text>

  <!-- ===== clawx container ===== -->
  <rect class="card-green" x="400" y="246" width="440" height="80" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-strong" x="620" y="282" text-anchor="middle" font-size="15.5" font-weight="700">clawx container</text>
  <text class="tx-green" x="620" y="304" text-anchor="middle" font-size="12.5">no CAP_NET_ADMIN &#183; no sudo</text>

  <!-- ===== service-gator ===== -->
  <rect class="card-green" x="100" y="414" width="236" height="120" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-strong" x="218" y="450" text-anchor="middle" font-size="15" font-weight="700">service-gator</text>
  <text class="tx-green" x="218" y="472" text-anchor="middle" font-size="12">scopes.json allowlist</text>
  <text class="tx-green2" x="218" y="492" text-anchor="middle" font-size="11.5">GitHub / GitLab / JIRA</text>
  <text class="tx-green2" x="218" y="511" text-anchor="middle" font-size="11.5">single audit trail</text>

  <!-- ===== mcp-searxng (opt-in) ===== -->
  <rect class="card-blue" x="368" y="414" width="236" height="64" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="486" y="442" text-anchor="middle" font-size="14.5" font-weight="700">mcp-searxng</text>
  <text class="tx-blue-dim" x="486" y="462" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== docs-mcp (opt-in) ===== -->
  <rect class="card-blue" x="636" y="414" width="236" height="96" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="754" y="446" text-anchor="middle" font-size="14.5" font-weight="700">docs-mcp</text>
  <text class="tx-blue" x="754" y="468" text-anchor="middle" font-size="12">scraper + index DB</text>
  <text class="tx-blue-dim" x="754" y="488" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== llm-wiki (opt-in) ===== -->
  <rect class="card-blue" x="904" y="414" width="236" height="96" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="1022" y="446" text-anchor="middle" font-size="14.5" font-weight="700">llm-wiki</text>
  <text class="tx-blue" x="1022" y="468" text-anchor="middle" font-size="12">git-backed wiki</text>
  <text class="tx-blue-dim" x="1022" y="488" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== searxng (opt-in) ===== -->
  <rect class="card-blue" x="368" y="510" width="236" height="64" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="486" y="538" text-anchor="middle" font-size="14" font-weight="700">searxng container</text>
  <text class="tx-blue-dim" x="486" y="558" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== host nftables (choke point) ===== -->
  <rect class="card-amber" x="360" y="648" width="520" height="86" rx="12" stroke-width="2.4" filter="url(#sh)"/>
  <text class="h-amber" x="620" y="684" text-anchor="middle" font-size="14.5" font-weight="700">host nftables &#183; OUTPUT chain</text>
  <text class="tx-amber" x="620" y="707" text-anchor="middle" font-size="12.5">proxy destination only</text>

  <!-- ===== egress proxy ===== -->
  <rect class="card-amber" x="380" y="864" width="480" height="100" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-amber" x="620" y="898" text-anchor="middle" font-size="15.5" font-weight="700">egress proxy</text>
  <text class="tx-amber" x="620" y="921" text-anchor="middle" font-size="12.5">allowlist check &#8594; block or forward</text>
  <text class="tx-amber-dim" x="620" y="941" text-anchor="middle" font-size="11.5">audit log &#183; outside agent VM</text>

  <!-- ===== public internet ===== -->
  <rect class="tab" x="500" y="1028" width="240" height="52" rx="26" stroke-width="1.2"/>
  <text class="tx-mid" x="620" y="1059" text-anchor="middle" font-size="14" font-weight="600">public internet</text>

  <!-- ===== edge labels ===== -->
  <g class="tx-muted" font-size="12">
    <g><rect class="label-pill" x="564" y="205" width="112" height="24" rx="9"/>
       <text x="620" y="221" text-anchor="middle">read-only mount</text></g>
    <g><rect class="label-pill" x="552" y="348" width="136" height="24" rx="9"/>
       <text x="620" y="364" text-anchor="middle">clawx-isolated bridge</text></g>
    <g><rect class="label-pill" x="528" y="784" width="184" height="24" rx="9"/>
       <text x="620" y="800" text-anchor="middle">HTTP_PROXY / HTTPS_PROXY</text></g>
    <g><rect class="label-pill" x="532" y="986" width="176" height="24" rx="9"/>
       <text x="620" y="1002" text-anchor="middle">permitted destinations only</text></g>
  </g>
</svg>
