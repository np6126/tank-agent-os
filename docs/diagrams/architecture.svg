<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="904" viewBox="0 0 1200 904"
     font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <!-- tank-agent-os architecture. Hand-authored SVG; theme-adaptive (auto light/dark). Edit coordinates directly to maintain. -->
  <style>
    /* ===== Theme tokens — default: dark. Light overrides in @media below. ===== */
    svg{
      --bg:#15181b; --vm-fill:#1a1e22; --vm-stroke:#333a42; --tab-fill:#22262b;
      --edge:#5a646c;
      --ink-strong:#e8eaed; --ink-mid:#9aa3a9; --ink-muted:#8b9398; --ink-dim:#6b757d;
      --green:#5db89c; --green-fill:#1a2a25; --green-text:#9fd8c6;
      --blue:#5b8b9c; --blue-fill:#1a2329; --blue-strong:#d3dde1; --blue-text:#93b8c4; --blue-dim:#7aa3b0;
      --amber:#e0a458; --amber-fill:#2a2316; --amber-strong:#f0c07a; --amber-text:#cf9a52;
      --op-fill:#5db89c; --op-text:#15181b;
      --shadow:#000000; --shadow-op:.55;
    }
    @media (prefers-color-scheme: light){
      svg{
        --bg:#ffffff; --vm-fill:#f6f8fa; --vm-stroke:#d0d7de; --tab-fill:#eaeef2;
        --edge:#848d96;
        --ink-strong:#1f2328; --ink-mid:#57606a; --ink-muted:#6e7781; --ink-dim:#6e7781;
        --green:#1f8a6a; --green-fill:#eaf5f0; --green-text:#1f7a5e;
        --blue:#3d7d91; --blue-fill:#eef3f6; --blue-strong:#1f2328; --blue-text:#356577; --blue-dim:#5a818f;
        --amber:#bf8b3e; --amber-fill:#fbf1dd; --amber-strong:#8a6420; --amber-text:#9a6f28;
        --op-fill:#1f8a6a; --op-text:#ffffff;
        --shadow:#1f2328; --shadow-op:.16;
      }
    }
    .bg{fill:var(--bg)}
    .vm{fill:var(--vm-fill);stroke:var(--vm-stroke)}
    .tab{fill:var(--tab-fill);stroke:var(--vm-stroke)}
    .label-pill{fill:var(--bg);stroke:var(--vm-stroke)}
    .edge{stroke:var(--edge)}
    .arrow{fill:var(--edge)}
    .card-green{fill:var(--green-fill);stroke:var(--green)}
    .card-blue{fill:var(--blue-fill);stroke:var(--blue)}
    .card-amber{fill:var(--amber-fill);stroke:var(--amber)}
    .op{fill:var(--op-fill)}
    .op-text{fill:var(--op-text)}
    .h-strong{fill:var(--ink-strong)}
    .h-blue{fill:var(--blue-strong)}
    .h-amber{fill:var(--amber-strong)}
    .tx-green{fill:var(--green-text)}
    .tx-greenbrand{fill:var(--green)}
    .tx-blue{fill:var(--blue-text)}
    .tx-blue-dim{fill:var(--blue-dim)}
    .tx-amber{fill:var(--amber-text)}
    .tx-mid{fill:var(--ink-mid)}
    .tx-muted{fill:var(--ink-muted)}
    .tx-dim{fill:var(--ink-dim)}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" class="arrow"/>
    </marker>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" style="flood-color:var(--shadow);flood-opacity:var(--shadow-op)"/>
    </filter>
  </defs>

  <rect class="bg" width="1200" height="904"/>

  <!-- ===== Agent VM container ===== -->
  <rect class="vm" x="48" y="120" width="1104" height="470" rx="18" stroke-width="1.5"/>
  <rect class="tab" x="66" y="106" width="252" height="30" rx="9" stroke-width="1"/>
  <text class="tx-mid" x="192" y="126" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" font-weight="600">Agent VM &#183; tank-agent-os</text>

  <!-- ===== edges ===== -->
  <g class="edge" fill="none" stroke-width="2">
    <path d="M600,74 L600,162" marker-end="url(#arr)"/>
    <path d="M460,274 L216,378" marker-end="url(#arr)"/>
    <path d="M530,274 L473,378" stroke-dasharray="6 5" marker-end="url(#arr)"/>
    <path d="M660,274 L727,378" stroke-dasharray="6 5" marker-end="url(#arr)"/>
    <path d="M730,274 L984,378" stroke-dasharray="6 5" marker-end="url(#arr)"/>
    <path d="M213,498 L466,640" marker-end="url(#arr)"/>
    <path d="M471,498 L545,640" marker-end="url(#arr)"/>
    <path d="M729,498 L640,640" marker-end="url(#arr)"/>
    <path d="M987,498 L728,640" marker-end="url(#arr)"/>
    <path d="M390,238 L88,238 Q72,238 72,254 L72,678 Q72,694 88,694 L402,694" marker-end="url(#arr)"/>
    <path d="M600,740 L600,778" marker-end="url(#arr)"/>
  </g>

  <!-- ===== Operator ===== -->
  <rect class="op" x="525" y="28" width="150" height="46" rx="23" filter="url(#sh)"/>
  <text class="op-text" x="600" y="56" text-anchor="middle" font-size="14" font-weight="700">Operator</text>

  <!-- ===== clawx container ===== -->
  <rect class="card-green" x="390" y="170" width="420" height="104" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-strong" x="600" y="203" text-anchor="middle" font-size="15.5" font-weight="700">clawx container</text>
  <text class="tx-green" x="600" y="226" text-anchor="middle" font-size="13">claw-code, opencode OR Claude Code agent</text>
  <text class="tx-greenbrand" x="600" y="247" text-anchor="middle" font-size="12">CLAUDE.md / AGENTS.md &#183; read-only</text>

  <!-- ===== service-gator ===== -->
  <rect class="card-green" x="105" y="386" width="216" height="112" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-strong" x="213" y="434" text-anchor="middle" font-size="15" font-weight="700">service-gator</text>
  <text class="tx-green" x="213" y="458" text-anchor="middle" font-size="12.5">scopes.json</text>

  <!-- ===== mcp-searxng (opt-in) ===== -->
  <rect class="card-blue" x="363" y="386" width="216" height="112" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="471" y="426" text-anchor="middle" font-size="15" font-weight="700">mcp-searxng</text>
  <text class="tx-blue" x="471" y="448" text-anchor="middle" font-size="12.5">+ searxng</text>
  <text class="tx-blue-dim" x="471" y="470" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== docs-mcp (opt-in) ===== -->
  <rect class="card-blue" x="621" y="386" width="216" height="112" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="729" y="426" text-anchor="middle" font-size="15" font-weight="700">docs-mcp</text>
  <text class="tx-blue" x="729" y="448" text-anchor="middle" font-size="12.5">scraper</text>
  <text class="tx-blue-dim" x="729" y="470" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== llm-wiki (opt-in) ===== -->
  <rect class="card-blue" x="879" y="386" width="216" height="112" rx="12" stroke-width="1.6" stroke-dasharray="6 5" filter="url(#sh)"/>
  <text class="h-blue" x="987" y="426" text-anchor="middle" font-size="15" font-weight="700">llm-wiki</text>
  <text class="tx-blue" x="987" y="448" text-anchor="middle" font-size="12.5">git-backed wiki</text>
  <text class="tx-blue-dim" x="987" y="470" text-anchor="middle" font-size="11">opt-in</text>

  <!-- ===== Egress Proxy ===== -->
  <rect class="card-amber" x="410" y="648" width="380" height="92" rx="12" stroke-width="1.6" filter="url(#sh)"/>
  <text class="h-amber" x="600" y="688" text-anchor="middle" font-size="15.5" font-weight="700">Egress Proxy</text>
  <text class="tx-amber" x="600" y="711" text-anchor="middle" font-size="12.5">allowlist + audit</text>

  <!-- ===== destinations ===== -->
  <rect class="vm" x="290" y="786" width="620" height="98" rx="12" stroke-width="1.5"/>
  <text class="tx-mid" x="600" y="816" text-anchor="middle" font-size="13" font-weight="600">GitHub &#183; Search engines &#183; Doc sites</text>
  <text class="tx-dim" x="600" y="838" text-anchor="middle" font-size="12">DDG &#183; Wikipedia &#183; MDN &#183; docs.python &#183; &#8230;</text>
  <text class="tx-mid" x="600" y="860" text-anchor="middle" font-size="13">Local + Cloud providers</text>

  <!-- ===== edge labels ===== -->
  <g class="tx-muted" font-size="12">
    <g><rect class="label-pill" x="578" y="106" width="44" height="24" rx="9"/>
       <text x="600" y="122" text-anchor="middle">SSH</text></g>
    <g><rect class="label-pill" x="313" y="314" width="48" height="24" rx="9"/>
       <text x="337" y="330" text-anchor="middle">MCP</text></g>
    <g><rect class="label-pill" x="447" y="314" width="108" height="24" rx="9"/>
       <text x="501" y="330" text-anchor="middle">MCP &#183; opt-in</text></g>
    <g><rect class="label-pill" x="639" y="314" width="108" height="24" rx="9"/>
       <text x="693" y="330" text-anchor="middle">MCP &#183; opt-in</text></g>
    <g><rect class="label-pill" x="803" y="314" width="108" height="24" rx="9"/>
       <text x="857" y="330" text-anchor="middle">MCP &#183; opt-in</text></g>
    <g><rect class="label-pill" x="522" y="612" width="156" height="24" rx="9"/>
       <text x="600" y="628" text-anchor="middle">nftables: proxy only</text></g>
  </g>
</svg>
